name: 'Install MongoDB'
runs:
  using: "composite"
  steps:
    - name: Install MongoDB Community Edition
      shell: bash
      run: |
        # Skip the download when mongod is already baked into the container image (docker/Dockerfile*)
        if command -v mongod >/dev/null; then
          echo "mongod already available, skipping download"
          mongod --version
          exit 0
        fi
        curl --retry 5 --retry-delay 5 --retry-connrefused -LO https://fastdl.mongodb.org/linux/mongodb-linux-x86_64-rhel80-7.0.0.tgz
        tar -xzf mongodb-linux-x86_64-rhel80-7.0.0.tgz
        cp mongodb-linux-x86_64-rhel80-7.0.0/bin/* /usr/local/bin/
        mongod --version
        rm -rf mongodb-linux-x86_64-rhel80-7.0.0.tgz
