name: 'Run proxy tests'
on:
  workflow_call:
    inputs:
      wheel:             {required: true, type: string, description: The name of the wheel artifact to test }
      os:                {required: true, type: string, description: The operating system to run the tests on }
      python3:           {default: '7', type: string, description: Specifies the version of python for testing }
jobs:
  run_proxy_tests:   
    # Only run on Linux
    if: inputs.os == 'linux' 
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
      options: --cap-add=NET_ADMIN
    steps:
      - name: Checkout
        uses: actions/checkout@v3.3.0

      - name: Get wheel artifact
        uses: actions/download-artifact@v3.0.2
        with:
          name: ${{inputs.wheel}}
          path: ${{runner.temp}}

      - name: Install deps
        shell: bash
        run: |
          apt update
          apt install -y software-properties-common iptables squid
          add-apt-repository ppa:deadsnakes/ppa -y

          # select-python no longer supports python3.6
          apt install -y python3.${{inputs.python3}}" python3.${{inputs.python3}}"-venv python3-pip
          python3.${{inputs.python3}}" -m venv /root/pyenvs/venv38

          sh -c 'echo "
          acl localnet src 127.0.0.1/32
          http_access allow localnet
          http_access deny all

          http_port 3128
          " >> /etc/squid/squid.conf'

          service squid restart
          iptables-legacy -A OUTPUT -p tcp --dport 80 -m owner ! --uid-owner proxy -j REJECT
          iptables-legacy -A OUTPUT -p tcp --dport 443 -m owner ! --uid-owner proxy -j REJECT

          export http_proxy="http://127.0.0.1:3128"
          export https_proxy="http://127.0.0.1:3128"

      - name: Install wheel
        shell: bash
        run: |
          echo ${{env.python_impl_name}}
          ls ${{env.python_impl_name}}
          python -m pip install --force-reinstall  ${{runner.temp}}/${{inputs.wheel}}[Testing]

      - name: Run proxy test
        shell: bash
        run: |
          python -m pytest --timeout=3600 python/tests/integration/arcticdb/test_arctic.py::test_s3_sts_auth