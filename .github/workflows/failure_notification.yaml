name: Check for master failure
on:
  workflow_run:
    workflows: ["Build and Test", "Build with conda", "Build with analysis tools", "Coverity Static Analysis", "Installation Tests Execution"]
    types: [completed]

jobs:
  track-failures:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'timed_out'
    permissions:
      issues: write
      actions: read
    outputs:
      slack_summary: ${{ steps.issues.outputs.slack_summary }}
    steps:
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "flaky-test" --repo "$REPO" --color "FBCA04" --description "Flaky test auto-tracked by CI" 2>/dev/null || true
          gh label create "flaky-step" --repo "$REPO" --color "F9D0C4" --description "Intermittent CI step failure auto-tracked" 2>/dev/null || true
          gh label create "ci-failure" --repo "$REPO" --color "D93F0B" --description "CI failure that could not be attributed to a specific test" 2>/dev/null || true

      - name: Analyse failed jobs
        id: parse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Fetching failed jobs for run $RUN_ID..."

          failed_jobs_json=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs?filter=latest&per_page=100" \
            --jq '[.jobs[] | select(.conclusion == "failure") | {id, name}]')

          if [ "$failed_jobs_json" = "[]" ] || [ -z "$failed_jobs_json" ]; then
            echo "No failed jobs found."
            echo "tests=" >> "$GITHUB_OUTPUT"
            echo "steps=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Failed jobs: $failed_jobs_json"

          # --- Collect failed steps from each job (via API) ---
          failed_steps=""
          for job_id in $(echo "$failed_jobs_json" | jq -r '.[].id'); do
            job_name=$(echo "$failed_jobs_json" | jq -r ".[] | select(.id == $job_id) | .name")
            step_names=$(gh api "repos/$REPO/actions/jobs/$job_id" \
              --jq '.steps[] | select(.conclusion == "failure") | .name')

            while IFS= read -r step; do
              [ -z "$step" ] && continue
              failed_steps="$failed_steps$job_name / $step"$'\n'
            done <<< "$step_names"
          done
          failed_steps=$(echo "$failed_steps" | grep -v '^$' | sort -u || true)
          echo "Failed steps:"
          echo "$failed_steps"

          # --- Download logs and parse test failures ---
          gh run view "$RUN_ID" --repo "$REPO" --log-failed > /tmp/failed_logs.txt 2>&1 || true

          failing_tests=""

          # GoogleTest: [  FAILED  ] TestSuite.TestName/Param
          gtest_failures=$(grep -oP '\[\s+FAILED\s+\]\s+\K[A-Za-z0-9_]+\.[A-Za-z0-9_/]+' /tmp/failed_logs.txt \
            | sort -u || true)
          for test in $gtest_failures; do
            base_test=$(echo "$test" | sed 's|/[0-9]*$||')
            failing_tests="$failing_tests$base_test"$'\n'
          done

          # pytest: FAILED path/to/test.py::TestClass::test_method
          pytest_failures=$(grep -oP 'FAILED\s+\K\S+::\S+' /tmp/failed_logs.txt \
            | sort -u || true)
          for test in $pytest_failures; do
            failing_tests="$failing_tests$test"$'\n'
          done

          failing_tests=$(echo "$failing_tests" | grep -v '^$' | sort -u || true)

          echo "Failing tests:"
          echo "$failing_tests"

          # --- Filter out test-runner steps when we already have test names ---
          infra_steps=""
          if [ -n "$failing_tests" ]; then
            while IFS= read -r step_entry; do
              [ -z "$step_entry" ] && continue
              if ! echo "$step_entry" | grep -qiE '(test|pytest|ctest)'; then
                infra_steps="$infra_steps$step_entry"$'\n'
              fi
            done <<< "$failed_steps"
          else
            infra_steps="$failed_steps"
          fi
          infra_steps=$(echo "$infra_steps" | grep -v '^$' | sort -u || true)

          # --- Write outputs ---
          if [ -n "$failing_tests" ]; then
            {
              echo "tests<<TESTS_EOF"
              echo "$failing_tests"
              echo "TESTS_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tests=" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$infra_steps" ]; then
            {
              echo "steps<<STEPS_EOF"
              echo "$infra_steps"
              echo "STEPS_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "steps=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update issues and build summary
        id: issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          FAILING_TESTS: ${{ steps.parse.outputs.tests }}
          FAILED_STEPS: ${{ steps.parse.outputs.steps }}
        run: |
          set -euo pipefail

          # We'll accumulate Slack summary lines here
          slack_lines=""

          run_date=$(date -u '+%Y-%m-%d %H:%M UTC')

          # --- Helper: find or create issue, append to slack_lines ---
          track_item() {
            local item_name="$1"
            local title_prefix="$2"
            local label="$3"
            local new_body="$4"

            local issue_title="$title_prefix: $item_name"

            local existing_issue
            existing_issue=$(gh issue list --repo "$REPO" \
              --label "$label" \
              --state open \
              --search "\"$item_name\" in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$issue_title\") | .number" \
              | head -1 || true)

            if [ -n "$existing_issue" ]; then
              echo "  Found existing issue #$existing_issue - adding comment"
              local comment_body="### Another failure observed"
              comment_body="$comment_body"$'\n\n'"- **Run:** $RUN_URL"
              comment_body="$comment_body"$'\n'"- **Commit:** \`${COMMIT_SHA:0:10}\`"
              comment_body="$comment_body"$'\n'"- **Date:** $run_date"
              gh issue comment "$existing_issue" --repo "$REPO" --body "$comment_body"

              local issue_url
              issue_url=$(gh issue view "$existing_issue" --repo "$REPO" --json url --jq '.url')
              slack_lines="$slack_lines"$'\n'":warning: *Known* — \`$item_name\` (<$issue_url|#$existing_issue>)"
            else
              echo "  No existing issue - creating new one"
              local new_issue_url
              new_issue_url=$(gh issue create --repo "$REPO" \
                --title "$issue_title" \
                --label "$label" \
                --body "$new_body" 2>&1 | tail -1)

              slack_lines="$slack_lines"$'\n'":rotating_light: *New* — \`$item_name\` (<$new_issue_url|issue>)"
            fi
          }

          # --- Process failing tests ---
          if [ -n "$FAILING_TESTS" ]; then
            while IFS= read -r test_name; do
              [ -z "$test_name" ] && continue
              echo "Processing test: $test_name"

              body="## Flaky test failure"
              body="$body"$'\n\n'"**Test:** \`$test_name\`"
              body="$body"$'\n\n'"This test has been detected as failing in CI."
              body="$body"$'\n\n'"### Failure history"
              body="$body"$'\n\n'"| Date | Run | Commit |"
              body="$body"$'\n'"|------|-----|--------|"
              body="$body"$'\n'"| $run_date | [Run #$RUN_ID]($RUN_URL) | \`${COMMIT_SHA:0:10}\` |"
              body="$body"$'\n\n'"---"
              body="$body"$'\n'"*This issue was automatically created by the flaky test tracker workflow.*"
              body="$body"$'\n'"*Add further failure occurrences as comments below.*"

              track_item "$test_name" "Flaky test" "flaky-test" "$body"
            done <<< "$FAILING_TESTS"
          fi

          # --- Process failed steps ---
          if [ -n "$FAILED_STEPS" ]; then
            while IFS= read -r step_entry; do
              [ -z "$step_entry" ] && continue
              echo "Processing step: $step_entry"

              body="## Intermittent CI step failure"
              body="$body"$'\n\n'"**Step:** \`$step_entry\`"
              body="$body"$'\n\n'"This CI step has failed. This is typically caused by transient infrastructure issues (network timeouts, package mirrors, etc.)."
              body="$body"$'\n\n'"### Failure history"
              body="$body"$'\n\n'"| Date | Run | Commit |"
              body="$body"$'\n'"|------|-----|--------|"
              body="$body"$'\n'"| $run_date | [Run #$RUN_ID]($RUN_URL) | \`${COMMIT_SHA:0:10}\` |"
              body="$body"$'\n\n'"---"
              body="$body"$'\n'"*This issue was automatically created by the flaky test tracker workflow.*"
              body="$body"$'\n'"*Add further failure occurrences as comments below.*"

              track_item "$step_entry" "Flaky step" "flaky-step" "$body"
            done <<< "$FAILED_STEPS"
          fi

          # --- Fallback for unparseable failures ---
          if [ -z "$FAILING_TESTS" ] && [ -z "$FAILED_STEPS" ]; then
            issue_title="CI failure (unparseable): run #$RUN_ID"
            body="## CI failure - could not identify specific failing test(s) or step(s)"
            body="$body"$'\n\n'"- **Run:** $RUN_URL"
            body="$body"$'\n'"- **Commit:** \`${COMMIT_SHA:0:10}\`"
            body="$body"$'\n'"- **Date:** $run_date"
            body="$body"$'\n\n'"The workflow failed but no individual test or step failure could be identified."
            body="$body"$'\n'"Please investigate the run logs directly."
            body="$body"$'\n\n'"---"
            body="$body"$'\n'"*This issue was automatically created by the flaky test tracker workflow.*"

            new_issue_url=$(gh issue create --repo "$REPO" \
              --title "$issue_title" \
              --label "ci-failure" \
              --body "$body" 2>&1 | tail -1)

            slack_lines=":question: Could not identify specific failures (<$new_issue_url|issue>)"
          fi

          # Write slack summary
          if [ -z "$slack_lines" ]; then
            slack_lines=":question: Could not identify specific failures"
          fi

          {
            echo "slack_summary<<SLACK_EOF"
            echo "$slack_lines"
            echo "SLACK_EOF"
          } >> "$GITHUB_OUTPUT"

  notify-slack:
    runs-on: ubuntu-latest
    needs: [track-failures]
    if: >-
      (github.event.workflow_run.head_branch == 'master' ||
       github.event.workflow_run.head_branch == '') &&
      always() &&
      needs.track-failures.result != 'skipped'
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          SUMMARY: ${{ needs.track-failures.outputs.slack_summary }}
        run: |
          if [ "$CONCLUSION" = "timed_out" ]; then
            icon=":hourglass:"
          else
            icon=":fire:"
          fi

          # Build the failures section — only include if we have a summary
          failures_block=""
          if [ -n "$SUMMARY" ]; then
            # Escape for JSON
            escaped_summary=$(echo "$SUMMARY" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read())[1:-1])")
            failures_block=",{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"$escaped_summary\"}}"
          fi

          payload=$(cat <<PAYLOAD_END
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "$icon *$WORKFLOW_NAME* $CONCLUSION on \`$BRANCH\`"
                }
              }$failures_block,
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<$REPO_URL|$REPO> | <$RUN_URL|View Failure>"
                  }
                ]
              }
            ]
          }
          PAYLOAD_END
          )

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
