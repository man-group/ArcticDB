name: CI failure notification
on:
  workflow_run:
    workflows: ["Build and Test", "Build with conda", "Build with analysis tools", "Coverity Static Analysis", "Installation Tests Execution"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "ID of the failed workflow run to analyse (from the run URL)"
        required: true
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  actions: read
  pull-requests: write

jobs:
  resolve-pr-run:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/analyse-failures') &&
      (github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    outputs:
      run_id: ${{ steps.find.outputs.run_id }}
      pr_number: ${{ github.event.issue.number }}
    steps:
      - name: React to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -f content='eyes' --silent

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find latest failed run
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          run_id=$(python3 .github/scripts/resolve_pr_run.py \
            --pr-number "$PR_NUMBER" \
            --repo "$REPO")

          if [ -z "$run_id" ]; then
            gh pr comment "$PR_NUMBER" \
              --repo "$REPO" \
              --body "No failed CI runs found for this PR."
            echo "run_id=" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          fi

  track-failures:
    runs-on: ubuntu-latest
    needs: [resolve-pr-run]
    # Run when: workflow_run (master only), workflow_dispatch, or issue_comment (with a resolved run ID)
    if: >-
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' &&
         needs.resolve-pr-run.outputs.run_id != '') ||
        (github.event_name == 'workflow_run' &&
         (github.event.workflow_run.conclusion == 'failure' ||
          github.event.workflow_run.conclusion == 'timed_out') &&
         (github.event.workflow_run.head_branch == 'master' ||
          github.event.workflow_run.head_branch == ''))
      )
    outputs:
      slack_summary: ${{ steps.summary.outputs.slack_summary }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve run metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          WR_RUN_ID: ${{ github.event.workflow_run.id }}
          DISPATCH_RUN_ID: ${{ github.event.inputs.run_id }}
          PR_RUN_ID: ${{ needs.resolve-pr-run.outputs.run_id }}
        run: |
          set -euo pipefail
          RUN_ID="${DISPATCH_RUN_ID:-${PR_RUN_ID:-$WR_RUN_ID}}"
          if [ -z "$RUN_ID" ]; then
            echo "::error::No run ID available"
            exit 1
          fi

          run_json=$(gh api "repos/$REPO/actions/runs/$RUN_ID" \
            --jq '{head_sha, head_branch, conclusion, name}')

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "run_url=$SERVER_URL/$REPO/actions/runs/$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(echo "$run_json" | jq -r '.head_sha')" >> "$GITHUB_OUTPUT"
          echo "branch=$(echo "$run_json" | jq -r '.head_branch')" >> "$GITHUB_OUTPUT"
          echo "conclusion=$(echo "$run_json" | jq -r '.conclusion')" >> "$GITHUB_OUTPUT"
          echo "workflow_name=$(echo "$run_json" | jq -r '.name')" >> "$GITHUB_OUTPUT"

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "autogenerated" --repo "$REPO" --color "C5DEF5" --description "Automatically created by CI workflows" 2>/dev/null || true
          gh label create "flaky-test" --repo "$REPO" --color "FBCA04" --description "Flaky test auto-tracked by CI" 2>/dev/null || true
          gh label create "flaky-step" --repo "$REPO" --color "F9D0C4" --description "Intermittent CI step failure auto-tracked" 2>/dev/null || true
          gh label create "ci-failure" --repo "$REPO" --color "D93F0B" --description "CI failure that could not be attributed to a specific test" 2>/dev/null || true

      - name: Parse CI failures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          META_RUN_ID: ${{ steps.meta.outputs.run_id }}
          META_REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/parse_ci_failures.py \
            --run-id "$META_RUN_ID" \
            --repo "$META_REPO" \
            --output-dir /tmp/ci_failures

      - name: Create or update issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          META_RUN_ID: ${{ steps.meta.outputs.run_id }}
          META_RUN_URL: ${{ steps.meta.outputs.run_url }}
          META_REPO: ${{ github.repository }}
          META_COMMIT_SHA: ${{ steps.meta.outputs.commit_sha }}
          META_CONCLUSION: ${{ steps.meta.outputs.conclusion }}
        run: |
          python3 .github/scripts/track_ci_issues.py \
            --input-dir /tmp/ci_failures \
            --run-id "$META_RUN_ID" \
            --run-url "$META_RUN_URL" \
            --repo "$META_REPO" \
            --commit-sha "$META_COMMIT_SHA" \
            --conclusion "$META_CONCLUSION" \
            --output-file /tmp/ci_failures/slack_summary.txt

      - name: Set Slack summary output
        id: summary
        run: |
          {
            echo "slack_summary<<SLACK_EOF"
            cat /tmp/ci_failures/slack_summary.txt
            echo "SLACK_EOF"
          } >> "$GITHUB_OUTPUT"

  notify-slack:
    runs-on: ubuntu-latest
    needs: [track-failures]
    # Only send Slack notifications for automatic master triggers, not manual dispatch
    if: >-
      github.event_name == 'workflow_run' &&
      (github.event.workflow_run.head_branch == 'master' ||
       github.event.workflow_run.head_branch == '') &&
      always() &&
      needs.track-failures.result != 'skipped' &&
      needs.track-failures.result != 'cancelled'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUMMARY: ${{ needs.track-failures.outputs.slack_summary }}
          TRACKER_RESULT: ${{ needs.track-failures.result }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_RUN_ID: ${{ github.event.workflow_run.id }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          # Write summary to a temp file for the script
          SUMMARY_ARG=""
          if [ -n "$SUMMARY" ]; then
            printf '%s' "$SUMMARY" > /tmp/slack_summary.txt
            SUMMARY_ARG="--summary-file /tmp/slack_summary.txt"
          fi

          python3 .github/scripts/send_slack_notification.py \
            --webhook-url "$SLACK_WEBHOOK_URL" \
            --workflow-name "$WR_NAME" \
            --conclusion "$WR_CONCLUSION" \
            --branch "$WR_BRANCH" \
            --run-url "$SERVER_URL/$REPO/actions/runs/$WR_RUN_ID" \
            --repo "$REPO" \
            --repo-url "$SERVER_URL/$REPO" \
            $SUMMARY_ARG \
            ${TRACKER_RESULT:+--tracker-result "$TRACKER_RESULT"}

  notify-pr:
    runs-on: ubuntu-latest
    needs: [resolve-pr-run, track-failures]
    if: >-
      always() &&
      github.event_name == 'issue_comment' &&
      needs.resolve-pr-run.outputs.run_id != '' &&
      needs.track-failures.result != 'cancelled'
    steps:
      - name: Post results to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ needs.track-failures.outputs.slack_summary }}
          RUN_ID: ${{ needs.resolve-pr-run.outputs.run_id }}
          PR_NUMBER: ${{ needs.resolve-pr-run.outputs.pr_number }}
          TRACKER_RESULT: ${{ needs.track-failures.result }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$TRACKER_RESULT" != "success" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "**CI failure analysis** for run \`$RUN_ID\` did not complete successfully (status: $TRACKER_RESULT)."
            exit 0
          fi

          # Convert Slack-flavoured markdown to GitHub markdown
          body=$(printf '%s\n' "$SUMMARY" \
            | sed 's/:rotating_light:/🚨/g' \
            | sed 's/:warning:/⚠️/g' \
            | sed 's/:question:/❓/g' \
            | sed 's/:hourglass:/⏳/g' \
            | sed 's/\*\([^*]*\)\*/**\1**/g')

          run_url="$SERVER_URL/$REPO/actions/runs/$RUN_ID"

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<EOF
          ### CI failure analysis

          Run: [$RUN_ID]($run_url)

          $body

          ---
          *Triggered by \`/analyse-failures\` comment.*
          EOF
          )"

      - name: React with result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRACKER_RESULT: ${{ needs.track-failures.result }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          emoji=$( [ "$TRACKER_RESULT" = "success" ] && echo "rocket" || echo "-1" )
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -f content="$emoji" --silent
